<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セラピー・スターシュート！</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #bff6ff;
    touch-action: none;
    font-family: sans-serif;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let player = {
  x: canvas.width / 2,
  y: canvas.height - 100,
  size: 34,
  hp: 3
};

let bullets = [];
let enemies = [];
let stars = [];
let score = 0;
let gameOver = false;

function shoot() {
  bullets.push({
    x: player.x,
    y: player.y - 25,
    r: 6
  });
}

setInterval(() => {
  if (!gameOver) shoot();
}, 250);

setInterval(() => {
  if (!gameOver) {
    enemies.push({
      x: Math.random() * canvas.width,
      y: -30,
      r: 22,
      speed: 2 + Math.random() * 2
    });
  }
}, 800);

setInterval(() => {
  if (!gameOver) {
    stars.push({
      x: Math.random() * canvas.width,
      y: -20,
      r: 10,
      speed: 2
    });
  }
}, 1200);

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  const t = e.touches[0];
  player.x = t.clientX;
  player.y = t.clientY;
}, { passive: false });

canvas.addEventListener("mousemove", e => {
  player.x = e.clientX;
  player.y = e.clientY;
});

function hit(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy) < a.r + b.r;
}

function drawSerapy(x, y) {
  ctx.font = "42px serif";
  ctx.textAlign = "center";
  ctx.fillText("🐣", x, y + 14);
}

function drawEnemy(e) {
  ctx.font = "36px serif";
  ctx.textAlign = "center";
  ctx.fillText("☁️", e.x, e.y + 12);
}

function drawBullet(b) {
  ctx.font = "22px serif";
  ctx.textAlign = "center";
  ctx.fillText("⭐", b.x, b.y);
}

function drawStar(s) {
  ctx.font = "24px serif";
  ctx.textAlign = "center";
  ctx.fillText("💎", s.x, s.y);
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, "#bff6ff");
  bg.addColorStop(0.5, "#e7ccff");
  bg.addColorStop(1, "#fff3c4");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "rgba(255,255,255,0.6)";
  for (let i = 0; i < 30; i++) {
    ctx.beginPath();
    ctx.arc((i * 77 + score) % canvas.width, (i * 131) % canvas.height, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  bullets.forEach(b => b.y -= 8);
  enemies.forEach(e => e.y += e.speed);
  stars.forEach(s => s.y += s.speed);

  bullets.forEach(drawBullet);
  enemies.forEach(drawEnemy);
  stars.forEach(drawStar);
  drawSerapy(player.x, player.y);

  bullets = bullets.filter(b => b.y > -20);
  enemies = enemies.filter(e => e.y < canvas.height + 50);
  stars = stars.filter(s => s.y < canvas.height + 50);

  for (let ei = enemies.length - 1; ei >= 0; ei--) {
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      if (hit(enemies[ei], bullets[bi])) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        score += 10;
        break;
      }
    }
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    if (hit({x: player.x, y: player.y, r: player.size}, enemies[i])) {
      enemies.splice(i, 1);
      player.hp--;
      if (player.hp <= 0) gameOver = true;
    }
  }

  for (let i = stars.length - 1; i >= 0; i--) {
    if (hit({x: player.x, y: player.y, r: player.size}, stars[i])) {
      stars.splice(i, 1);
      score += 30;
    }
  }

  ctx.fillStyle = "#333";
  ctx.font = "20px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("SCORE: " + score, 16, 32);
  ctx.fillText("HP: " + "❤️".repeat(player.hp), 16, 62);

  if (gameOver) {
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#333";
    ctx.textAlign = "center";
    ctx.font = "32px sans-serif";
    ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 30);

    ctx.font = "22px sans-serif";
    ctx.fillText("スコア: " + score, canvas.width / 2, canvas.height / 2 + 10);
    ctx.fillText("更新するともう一回遊べる🐣", canvas.width / 2, canvas.height / 2 + 50);
  }

  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
