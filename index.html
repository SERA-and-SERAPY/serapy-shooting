<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セラピー・スターシュート Ver0.32</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;background:#bff6ff;touch-action:none;font-family:sans-serif;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();addEventListener("resize",resize);

const titleImg=new Image();
titleImg.src="title.png";

function drawCoverImage(img){
  const scale=Math.max(canvas.width/img.width,canvas.height/img.height);
  const w=img.width*scale,h=img.height*scale;
  ctx.drawImage(img,(canvas.width-w)/2,(canvas.height-h)/2,w,h);
}

const SAVE_KEY="serapy_star_save_v031";
let save=JSON.parse(localStorage.getItem(SAVE_KEY)||"{}");
if(!save.high)save.high={easy:0,normal:0,hard:0,nightmare:0,overall:0};
if(!save.playCount)save.playCount=0;
if(!save.totalGems)save.totalGems=0;
if(!save.deaths)save.deaths=0;
if(!save.titles)save.titles=[];
if(!save.currentTitle)save.currentTitle="🥚 はじめての冒険者";
if(!save.unlockedNightmare)save.unlockedNightmare=false;
if(!save.flags)save.flags={};
function saveData(){localStorage.setItem(SAVE_KEY,JSON.stringify(save));}

let scene="title",mode="normal",frame=0,buttons=[];
let player,bullets=[],enemies=[],gems=[];
let score=0,runGems=0,damage=0,startTime=0,newTitles=[];
let titleIdleStart=Date.now(),titleIdle=0,titleScroll=0,lastPointerY=0,isDraggingTitles=false;

const achievements=[
["first","🥚 はじめての冒険者","1回プレイする",false,()=>save.playCount>=1,()=>`${save.playCount}/1`],
["play5","🐣 セラピーのおとも","5回プレイする",false,()=>save.playCount>=5,()=>`${save.playCount}/5`],
["play10","✨ 仲良しさん","10回プレイする",false,()=>save.playCount>=10,()=>`${save.playCount}/10`],
["play20","🌈 セラピー大好き","20回プレイする",false,()=>save.playCount>=20,()=>`${save.playCount}/20`],
["play30","👑 セラピーの相棒","30回プレイする",false,()=>save.playCount>=30,()=>`${save.playCount}/30`],
["gem100","💎 宝石好き","宝石を100個集める",false,()=>save.totalGems>=100,()=>`${save.totalGems}/100`],
["gem300","✨ キラキラコレクター","宝石を300個集める",false,()=>save.totalGems>=300,()=>`${save.totalGems}/300`],
["gem500","👑 宝石王","宝石を500個集める",false,()=>save.totalGems>=500,()=>`${save.totalGems}/500`],
["gem1000","💠 宝石の守り人","宝石を1000個集める",false,()=>save.totalGems>=1000,()=>`${save.totalGems}/1000`],
["idle60","😴 ちょっと休憩","タイトル画面で1分待機する",false,()=>save.flags.idle60,()=>save.flags.idle60?"達成":"未達成"],
["idle120","💤 うとうとさん","タイトル画面で2分待機する",false,()=>save.flags.idle120,()=>save.flags.idle120?"達成":"未達成"],
["idle180","🛌 寝落ちマスター","タイトル画面で3分待機する",false,()=>save.flags.idle180,()=>save.flags.idle180?"達成":"未達成"],
["easy3000","🌸 朝のおとも","朝のおさんぽで3000点達成",false,()=>save.high.easy>=3000,()=>`${save.high.easy}/3000`],
["normal3000","💎 探検家","宝石あつめで3000点達成",false,()=>save.high.normal>=3000,()=>`${save.high.normal}/3000`],
["hard3000","🌙 夜更かしさん","夜セラで3000点達成",false,()=>save.high.hard>=3000,()=>`${save.high.hard}/3000`],
["unlockNightmare","🌑 悪夢への挑戦者","悪夢の月を解放する",false,()=>save.unlockedNightmare,()=>save.unlockedNightmare?"達成":"未達成"],
["bat","🦇 コウモリハンター","コウモリを100体倒す ※今後追加",false,()=>false,()=>"-"],
["ghost","👻 ゴーストバスター","ゴーストを100体倒す ※今後追加",false,()=>false,()=>"-"],
["shadow","🌑 シャドウブレイカー","黒星を100体倒す ※今後追加",false,()=>false,()=>"-"],
["oneplay50","💎 一攫千金","1プレイで宝石50個集める",false,()=>save.flags.oneplay50,()=>save.flags.oneplay50?"達成":"未達成"],
["hp1","❤️ 不死鳥","HP1の状態で3000点達成",false,()=>save.flags.hp1,()=>save.flags.hp1?"達成":"未達成"],
["speed","⚡ スピードスター","3分以内に3000点達成",false,()=>save.flags.speed,()=>save.flags.speed?"達成":"未達成"],
["nodamage","🎯 ノーダメージ","被弾0で3000点達成",false,()=>save.flags.nodamage,()=>save.flags.nodamage?"達成":"未達成"],
["fastdeath","💀 逆に才能","開始5秒以内にゲームオーバー",false,()=>save.flags.fastdeath,()=>save.flags.fastdeath?"達成":"未達成"],
["death10","🐣 おっとっと！","累計10回ゲームオーバー",false,()=>save.deaths>=10,()=>`${save.deaths}/10`],
["bug","📝 バグハンター","条件不明",true,()=>save.flags.bug,()=>"?"],
["sleep10","😪 寝過ぎです！","タイトル画面で10分待機する",false,()=>save.flags.sleep10,()=>save.flags.sleep10?"達成":"未達成"],
["doctor","📚 セラピー博士","称号を15個獲得する",false,()=>ownedCount()>=15,()=>`${ownedCount()}/15`],
["master","🏆 セラピーマスター","称号を23個獲得する",false,()=>ownedCount()>=23,()=>`${ownedCount()}/23`],
["legend","🌈 セラピー伝説","称号を30個すべて獲得する",false,()=>ownedCount()>=30,()=>`${ownedCount()}/30`]
];

function ownedCount(){return save.titles.length;}
function hasTitle(id){return save.titles.includes(id);}
function checkAchievements(){
  for(let pass=0;pass<3;pass++){
    achievements.forEach(a=>{
      if(!hasTitle(a[0])&&a[4]()){
        save.titles.push(a[0]);
        save.currentTitle=a[1];
        newTitles.push(a[1]);
      }
    });
  }
  saveData();
}

function diff(){
  if(mode==="easy")return {name:"🌸 朝のおさんぽ",hp:5,enemyRate:.7,enemySpeed:.8,gemRate:2,bg:"easy"};
  if(mode==="hard")return {name:"🌙 夜セラのいたずら",hp:2,enemyRate:1.5,enemySpeed:1.3,gemRate:.7,bg:"hard"};
  if(mode==="nightmare")return {name:"🌑 悪夢の月",hp:1,enemyRate:2,enemySpeed:1.7,gemRate:.5,bg:"nightmare"};
  return {name:"💎 宝石あつめ",hp:3,enemyRate:1,enemySpeed:1,gemRate:1,bg:"normal"};
}

function startGame(m){
  mode=m; const d=diff();
  player={x:canvas.width/2,y:canvas.height-100,targetX:canvas.width/2,targetY:canvas.height-100,size:34,hp:d.hp,maxHp:d.hp};
  bullets=[]; enemies=[]; gems=[]; score=0; runGems=0; damage=0; newTitles=[];
  startTime=Date.now();
  save.playCount++;
  saveData(); checkAchievements();
  scene="game";
}

function finishGame(){
  scene="gameover";
  save.deaths++;
  save.totalGems+=runGems;
  if(score>save.high[mode])save.high[mode]=score;
  if(score>save.high.overall)save.high.overall=score;
  if(score>=3000){
    save.unlockedNightmare=true;
    if(player.hp===1)save.flags.hp1=true;
    if((Date.now()-startTime)/1000<=180)save.flags.speed=true;
    if(damage===0)save.flags.nodamage=true;
  }
  if(runGems>=50)save.flags.oneplay50=true;
  if((Date.now()-startTime)/1000<=5)save.flags.fastdeath=true;
  saveData(); checkAchievements();
}

function resetIdle(){titleIdleStart=Date.now();titleIdle=0;}

function bg(type="easy"){
  let g=ctx.createLinearGradient(0,0,0,canvas.height);
  if(type==="hard"||type==="nightmare"){
    g.addColorStop(0,"#101846");g.addColorStop(.55,"#56338d");g.addColorStop(1,"#171225");
  }else{
    g.addColorStop(0,"#bff6ff");g.addColorStop(.48,"#e8c9ff");g.addColorStop(1,"#fff0b8");
  }
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<45;i++){
    ctx.fillStyle=i%3===0?"rgba(255,255,255,.8)":"rgba(255,240,160,.65)";
    ctx.beginPath();
    ctx.arc((i*79+frame*.35)%canvas.width,(i*131+frame*.18)%canvas.height,1.8+(i%3),0,Math.PI*2);
    ctx.fill();
  }
}

function rrect(x,y,w,h,r,c){
  ctx.fillStyle=c;ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();
}

function txt(s,x,y,size=18,color="#333",align="center"){
  ctx.fillStyle=color;ctx.font=`${size}px sans-serif`;ctx.textAlign=align;ctx.fillText(s,x,y);
}

function button(label,x,y,w,h,act,hidden=false){
  buttons.push({x,y,w,h,act});
  if(hidden)return;
  rrect(x,y,w,h,18,"rgba(255,255,255,.82)");
  ctx.strokeStyle="rgba(255,190,90,.95)";ctx.lineWidth=2;ctx.stroke();
  txt(label,x+w/2,y+h/2+7,17);
}

function drawTitle(){
  buttons=[];
  titleIdle=(Date.now()-titleIdleStart)/1000;
  if(titleIdle>=60)save.flags.idle60=true;
  if(titleIdle>=120)save.flags.idle120=true;
  if(titleIdle>=180)save.flags.idle180=true;
  if(titleIdle>=600)save.flags.sleep10=true;
  checkAchievements();

  if(titleImg.complete&&titleImg.width>0)drawCoverImage(titleImg);
  else bg("easy");

  const x=canvas.width*0.18;
  const w=canvas.width*0.64;
  const h=canvas.height*0.045;

  button("",x,canvas.height*0.390,w,h,()=>startGame("normal"),true);
  button("",x,canvas.height*0.448,w,h,()=>startGame("easy"),true);
  button("",x,canvas.height*0.505,w,h,()=>startGame("normal"),true);
  button("",x,canvas.height*0.562,w,h,()=>startGame("hard"),true);
  button("",x,canvas.height*0.619,w,h,()=>{if(save.unlockedNightmare)startGame("nightmare");},true);

  button("",canvas.width*0.18,canvas.height*0.687,canvas.width*0.30,h,()=>{scene="titles";titleScroll=0;},true);
  button("",canvas.width*0.52,canvas.height*0.687,canvas.width*0.30,h,()=>scene="high",true);
  button("",x,canvas.height*0.744,w,h,()=>scene="how",true);

  rrect(canvas.width*0.12,canvas.height*0.845,canvas.width*0.76,canvas.height*0.105,18,"rgba(255,255,255,.88)");
  txt("現在の称号",canvas.width/2,canvas.height*0.875,14);
  txt(save.currentTitle,canvas.width/2,canvas.height*0.905,20);
  txt(`称号達成率：${ownedCount()} / 30`,canvas.width/2,canvas.height*0.935,14);
  txt("Ver0.32α GPTと作っているです！🐣✨",canvas.width/2,canvas.height-18,12,"#fff");
}

function drawHow(){
  buttons=[];bg("easy");
  txt("📖 あそびかた",canvas.width/2,62,30);
  txt("🐣 いっぱい遊ぶですよ〜！",canvas.width/2,105,17);
  const list=["🐣 指でセラピーを動かそう！","⭐ 星は自動で発射するです！","💎 宝石を集めるとスコアアップ！","☁️ 敵に当たるとHPが減るです！","🏆 称号を集めよう！","🌑 スコア3000で悪夢の月解放！"];
  let y=150;
  list.forEach(v=>{rrect(32,y-28,canvas.width-64,43,15,"rgba(255,255,255,.82)");txt(v,canvas.width/2,y,16);y+=56;});
  button("🏠 タイトルへ戻る",38,canvas.height-75,canvas.width-76,48,()=>{scene="title";resetIdle();});
}

function drawHigh(){
  buttons=[];bg("easy");
  txt("🏅 ハイスコア",canvas.width/2,60,30);
  txt("🐣 いっぱい遊んでくれて嬉しいです〜！",canvas.width/2,98,15);
  const rows=[["🌸 朝のおさんぽ",save.high.easy],["💎 宝石あつめ",save.high.normal],["🌙 夜セラのいたずら",save.high.hard],["🌑 悪夢の月",save.unlockedNightmare?save.high.nightmare:"🔒 未解放"],["🏆 総合最高",save.high.overall]];
  let y=135;
  rows.forEach(r=>{rrect(32,y-28,canvas.width-64,44,15,"rgba(255,255,255,.86)");txt(r[0],54,y,15,"#333","left");txt(String(r[1]),canvas.width-54,y,18,"#333","right");y+=54;});
  rrect(32,y,canvas.width-64,105,18,"rgba(255,255,255,.7)");
  txt(`🎮 プレイ回数：${save.playCount}回`,canvas.width/2,y+30,16);
  txt(`💎 累計宝石：${save.totalGems}個`,canvas.width/2,y+58,16);
  txt(`🏆 称号：${ownedCount()} / 30`,canvas.width/2,y+86,16);
  button("🏠 タイトルへ戻る",38,canvas.height-75,canvas.width-76,48,()=>{scene="title";resetIdle();});
}

function drawTitles(){
  buttons=[];bg("easy");
  txt("🏆 称号コレクション",canvas.width/2,44,25);
  txt("現在の称号："+save.currentTitle,canvas.width/2,73,13);
  txt(`達成率：${ownedCount()} / 30`,canvas.width/2,96,14);
  ctx.save();ctx.beginPath();ctx.rect(0,113,canvas.width,canvas.height-190);ctx.clip();
  let y=125-titleScroll;
  achievements.forEach(a=>{
    const own=hasTitle(a[0]),hidden=a[3]&&!own;
    rrect(24,y,canvas.width-48,72,15,own?"rgba(255,255,255,.92)":"rgba(255,255,255,.62)");
    txt(hidden?"？？？？？":a[1],44,y+25,15,"#333","left");
    txt(hidden?"条件不明":a[2],44,y+48,12,"#555","left");
    txt(own?"達成済":(hidden?"?":a[5]()),canvas.width-44,y+48,12,"#555","right");
    y+=82;
  });
  ctx.restore();
  button("🏠 タイトルへ戻る",38,canvas.height-70,canvas.width-76,45,()=>{scene="title";resetIdle();});
}

let lastShot=0;
function spawnEnemy(){
  const d=diff();
  enemies.push({x:Math.random()*canvas.width,y:-30,r:22,speed:(2+Math.random()*2)*d.enemySpeed,emoji:mode==="hard"?"🦇":mode==="nightmare"?"🌑":"☁️"});
}
function spawnGem(){gems.push({x:Math.random()*canvas.width,y:-20,r:16,speed:2});}
function shoot(){bullets.push({x:player.x,y:player.y-25,r:7});}
function hit(a,b){return Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r;}
function emoji(e,x,y,s){ctx.font=s+"px serif";ctx.textAlign="center";ctx.fillText(e,x,y);}

function drawGame(){
  const d=diff();bg(d.bg);
  if(frame-lastShot>15){shoot();lastShot=frame;}
  if(frame%Math.max(20,Math.floor(55/d.enemyRate))===0)spawnEnemy();
  if(frame%Math.max(25,Math.floor(90/d.gemRate))===0)spawnGem();
  player.x+=(player.targetX-player.x)*.2;player.y+=(player.targetY-player.y)*.2;
  bullets.forEach(b=>b.y-=8);enemies.forEach(e=>e.y+=e.speed);gems.forEach(g=>g.y+=g.speed);
  bullets.forEach(b=>emoji("⭐",b.x,b.y,22));
  enemies.forEach(e=>emoji(e.emoji,e.x,e.y+10,36));
  gems.forEach(g=>emoji("💎",g.x,g.y,34));
  emoji("🐣",player.x,player.y+14,45);
  bullets=bullets.filter(b=>b.y>-20);enemies=enemies.filter(e=>e.y<canvas.height+55);gems=gems.filter(g=>g.y<canvas.height+55);
  for(let ei=enemies.length-1;ei>=0;ei--){
    for(let bi=bullets.length-1;bi>=0;bi--){
      if(hit(enemies[ei],bullets[bi])){enemies.splice(ei,1);bullets.splice(bi,1);score+=10;break;}
    }
  }
  for(let i=enemies.length-1;i>=0;i--){
    if(hit({x:player.x,y:player.y,r:player.size},enemies[i])){
      enemies.splice(i,1);player.hp--;damage++;
      if(player.hp<=0)finishGame();
    }
  }
  for(let i=gems.length-1;i>=0;i--){
    if(hit({x:player.x,y:player.y,r:player.size},gems[i])){
      gems.splice(i,1);score+=30;runGems++;
    }
  }
  txt("SCORE: "+score,16,32,20,"#333","left");
  txt("HP: "+"❤️".repeat(player.hp),16,62,20,"#333","left");
  txt(d.name,16,92,16,"#333","left");
  if(score>=3000&&!save.unlockedNightmare){save.unlockedNightmare=true;saveData();checkAchievements();}
}

function drawGameOver(){
  buttons=[];bg("easy");
  txt("GAME OVER",canvas.width/2,78,34);
  txt("🐣",canvas.width/2,138,52);
  txt("次はもっと頑張るですよ〜！",canvas.width/2,184,18);
  rrect(38,218,canvas.width-76,180,20,"rgba(255,255,255,.86)");
  txt("今回のスコア",canvas.width/2,258,16);
  txt(String(score),canvas.width/2,298,36);
  txt("獲得宝石："+runGems+"個",canvas.width/2,338,18);
  txt("ハイスコア："+save.high[mode],canvas.width/2,370,18);
  if(newTitles.length>0){
    rrect(38,420,canvas.width-76,70,18,"rgba(255,255,255,.75)");
    txt("🏆 新称号獲得！",canvas.width/2,448,18);
    txt(newTitles[newTitles.length-1],canvas.width/2,476,16);
  }
  button("🔄 もう一回遊ぶ",38,canvas.height-140,canvas.width-76,48,()=>startGame(mode));
  button("🏠 タイトルへ戻る",38,canvas.height-80,canvas.width-76,48,()=>{scene="title";resetIdle();});
}

function pointerDown(x,y){
  resetIdle();
  if(scene==="game"){player.targetX=x;player.targetY=y;return;}
  if(scene==="titles"){isDraggingTitles=true;lastPointerY=y;}
  for(const b of buttons){
    if(x>b.x&&x<b.x+b.w&&y>b.y&&y<b.y+b.h){b.act();return;}
  }
}
function pointerMove(x,y){
  if(scene==="game"){player.targetX=x;player.targetY=y;}
  if(scene==="titles"&&isDraggingTitles){
    titleScroll+=lastPointerY-y;
    titleScroll=Math.max(0,Math.min(titleScroll,achievements.length*82-330));
    lastPointerY=y;
  }
}
function pointerUp(){isDraggingTitles=false;}

canvas.addEventListener("pointerdown",e=>pointerDown(e.clientX,e.clientY));
canvas.addEventListener("pointermove",e=>pointerMove(e.clientX,e.clientY));
canvas.addEventListener("pointerup",pointerUp);
canvas.addEventListener("pointercancel",pointerUp);

function update(){
  frame++;ctx.clearRect(0,0,canvas.width,canvas.height);
  if(scene==="title")drawTitle();
  else if(scene==="how")drawHow();
  else if(scene==="high")drawHigh();
  else if(scene==="titles")drawTitles();
  else if(scene==="game")drawGame();
  else if(scene==="gameover")drawGameOver();
  requestAnimationFrame(update);
}
update();
</script>
</body>
</html>
